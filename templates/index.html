<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dublin Bikes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header id="navbar">
    <div id="brand">🚲 Dublin Bikes</div>
    <div id="weather-panel">
      <span id="weather-info">Loading weather…</span>
    </div>
    <button id="btn-refresh" title="Refresh data">↻ Refresh</button>
  </header>

  <div id="map"></div>

  <div id="status-bar">
    <span id="station-count"></span>
    <div id="legend">
      <span class="legend-dot green"></span> Many bikes
      <span class="legend-dot orange"></span> Few bikes
      <span class="legend-dot red"></span> No bikes
      <span class="legend-dot grey"></span> Closed
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
